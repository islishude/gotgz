name: test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      ruststack:
        image: ghcr.io/tyrchen/ruststack:0.3.0
        env:
          DEFAULT_REGION: us-east-1
          SERVICES: s3
        ports: ["4566:4566"]
        options: >-
          --no-healthcheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - name: Wait for RustStack
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:4566/health >/dev/null; do sleep 1; done'
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: go build ./...
      - run: gofmt -d .
      - run: go vet ./...
      - run: go fix -diff ./...
      - run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        env:
          GOTGZ_TEST_S3_ENDPOINT: "http://localhost:4566"
      - run: go tool cover -func=coverage.txt

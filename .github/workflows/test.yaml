name: test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      ruststack:
        image: ghcr.io/tyrchen/rustack:0.7.2
        env:
          DEFAULT_REGION: us-east-1
          SERVICES: s3
        ports: ["4566:4566"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: go build ./...
      - run: gofmt -d .
      - run: go vet ./...
      - run: go fix -diff ./...
      - run: go test -v -race -count=1 -coverprofile=coverage.txt -covermode=atomic -tags "integration e2e" ./...
        env:
          DEFAULT_REGION: us-east-1
          GOTGZ_TEST_S3_ENDPOINT: "http://localhost:4566"
      - run: go tool cover -func=coverage.txt
      - name: Test vendors
        run: go test -v -race -count=1 ./...
        working-directory: internal/compress
